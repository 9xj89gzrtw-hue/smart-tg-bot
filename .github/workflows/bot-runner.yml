name: Smart Bot 24/7 Runner

on:
  schedule:
    - cron: '0 */4 * * *'
    - cron: '30 */4 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    env:
      TG_TOKEN: ${{ secrets.TG_TOKEN }}
      ALLOWED_CHATS: ${{ secrets.ALLOWED_CHATS }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      GH_TOKENS: ${{ secrets.GH_TOKENS }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GOOGLE_AI_KEY: ${{ secrets.GOOGLE_AI_KEY }}
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      
      - name: Check if another run is active
        id: check
        run: |
          ACTIVE=$(curl -s -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            "https://api.github.com/repos/9xj89gzrtw-hue/smart-tg-bot/actions/workflows/bot-runner.yml/runs?status=in_progress&per_page=5" \
            | jq '.total_count')
          echo "Active runs: $ACTIVE"
          if [ "$ACTIVE" -gt 1 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Start Bot v4
        if: steps.check.outputs.skip != 'true'
        run: timeout 280m node scripts/gh_actions_bot_v4.mjs || true
      
      - name: Trigger next run
        if: always() && steps.check.outputs.skip != 'true'
        run: |
          sleep 5
          curl -s -X POST \
            "https://api.github.com/repos/9xj89gzrtw-hue/smart-tg-bot/actions/workflows/bot-runner.yml/dispatches" \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main"}' || true

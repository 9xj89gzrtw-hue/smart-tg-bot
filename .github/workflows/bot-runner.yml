name: Smart Bot 24/7 Runner

on:
  schedule:
    - cron: '0 */4 * * *'
    - cron: '30 */4 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    env:
      TG_TOKEN: ${{ secrets.TG_TOKEN }}
      ALLOWED_CHATS: ${{ secrets.ALLOWED_CHATS }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      
      - name: Start Minimal Bot
        run: timeout 280m node scripts/minimal_bot.mjs 2>&1 | tee bot.log
      
      - name: Commit logs
        if: always()
        run: |
          git config user.name "bot-logger"
          git config user.email "bot@logger.bot"
          git add bot.log || true
          git commit -m "Bot logs $(date -u +'%Y-%m-%d %H:%M')" || true
          git push || true
      
      - name: Trigger next run
        if: always()
        run: |
          sleep 5
          curl -s -X POST \
            "https://api.github.com/repos/9xj89gzrtw-hue/smart-tg-bot/actions/workflows/bot-runner.yml/dispatches" \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main"}' || true

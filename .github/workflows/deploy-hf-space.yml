name: Deploy HF Space — v948 Pullbot (autonomous second host)

# =============================================================================
# Этот workflow:
#   1. Создаёт HF Space danilaonly/v948-pullbot (если не существует)
#   2. Заливает все файлы из hf-space-bundle/ на Space
#   3. Устанавливает Secrets на Space
#   4. Ждёт пока Space перейдёт в RUNNING
#   5. Запускает verify_routing.py
#
# Trigger:
#   - автоматически при push в main (если меняются файлы в hf-space-bundle/)
#   - вручную через workflow_dispatch (с параметром force_recreate=true)
#
# Requires GitHub secrets (устанавливаются один раз через gh_helper.py):
#   - HF_TOKEN              (обязательно)
#   - TELEGRAM_BOT_TOKEN    (обязательно)
#   - TELEGRAM_CHAT_ID      (обязательно)
#   - ZAI_API_KEY           (опционально)
# =============================================================================

on:
  push:
    branches: [main]
    paths:
      - 'hf-space-bundle/**'
      - '.github/workflows/deploy-hf-space.yml'
  workflow_dispatch:
    inputs:
      force_recreate:
        description: 'Delete and recreate Space from scratch'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir huggingface_hub httpx
          # libsodium для шифрования secrets (если нужен)
          # уже есть в ubuntu-latest

      - name: Configure HF CLI
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          huggingface-cli login --token "$HF_TOKEN" --add-to-git-credential || \
            hf auth login --token "$HF_TOKEN"

      - name: (Optional) Force recreate Space
        if: ${{ github.event.inputs.force_recreate == 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          try:
              api.delete_repo('danilaonly/v948-pullbot', repo_type='space')
              print('Deleted existing Space')
          except Exception as e:
              print(f'Delete skipped: {e}')
          "

      - name: Create HF Space if not exists
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          try:
              api.create_repo(
                  repo_id='danilaonly/v948-pullbot',
                  repo_type='space',
                  space_sdk='docker',
                  private=False,  # Public — критично! Private имеет auth-bug
                  exist_ok=True,
              )
              print('Space ready: danilaonly/v948-pullbot')
          except Exception as e:
              print(f'Create error: {e}')
              raise
          "

      - name: Set Space hardware (CPU basic, free)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          try:
              api.request_space_hardware('danilaonly/v948-pullbot', 'cpu-basic')
              print('Hardware: cpu-basic')
          except Exception as e:
              print(f'Hardware set skipped: {e}')
          "

      - name: Upload bundle files to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import os
          from huggingface_hub import HfApi, upload_folder
          api = HfApi()

          bundle_dir = 'hf-space-bundle'
          if not os.path.isdir(bundle_dir):
              raise RuntimeError(f'Bundle dir not found: {bundle_dir}')

          # Upload entire bundle as Space root
          upload_folder(
              folder_path=bundle_dir,
              repo_id='danilaonly/v948-pullbot',
              repo_type='space',
              commit_message='Autonomous HF Space — second host for v948 pullbot',
              ignore_patterns=['.git*', '*.pyc', '__pycache__', '.env*'],
          )
          print('Upload complete')
          "

      - name: Set Space secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
        run: |
          python -c "
          import os
          from huggingface_hub import HfApi
          api = HfApi()

          secrets = {
              'TELEGRAM_BOT_TOKEN': os.environ['TG_TOKEN'],
              'TELEGRAM_CHAT_ID': os.environ['TG_CHAT_ID'],
          }
          if os.environ.get('ZAI_API_KEY'):
              secrets['ZAI_API_KEY'] = os.environ['ZAI_API_KEY']

          for key, val in secrets.items():
              try:
                  api.add_space_secret('danilaonly/v948-pullbot', key, val)
                  print(f'  ✓ Set secret: {key}')
              except Exception as e:
                  # Fallback to variable if secret API changed
                  try:
                      api.add_space_variable('danilaonly/v948-pullbot', key, val)
                      print(f'  ✓ Set variable: {key}')
                  except Exception as e2:
                      print(f'  ✗ Failed {key}: {e} / {e2}')
          "

      - name: Wait for Space to build and run
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import time, sys
          from huggingface_hub import HfApi
          api = HfApi()
          space_id = 'danilaonly/v948-pullbot'

          for i in range(40):  # 10 минут max
              try:
                  info = api.space_info(space_id)
                  stage = info.runtime.stage if info.runtime else 'unknown'
                  print(f'  [{i*15}s] stage={stage}')
                  if stage == 'RUNNING':
                      print('✓ Space is RUNNING')
                      sys.exit(0)
                  if stage in ('BUILD_ERROR', 'RUNTIME_ERROR', 'PAUSED'):
                      print(f'✗ Space failed: {stage}')
                      sys.exit(1)
              except Exception as e:
                  print(f'  [{i*15}s] error: {e}')
              time.sleep(15)
          print('✗ Timeout waiting for Space')
          sys.exit(1)
          "

      - name: Verify routing
        run: |
          pip install --no-cache-dir httpx
          curl -sL -o verify_routing.py \
            https://raw.githubusercontent.com/9xj89gzrtw-hue/v950-bot/main/hf-space-bundle/verify_routing.py || \
          cp hf-space-bundle/verify_routing.py verify_routing.py 2>/dev/null || true

          if [ -f verify_routing.py ]; then
            python verify_routing.py https://danilaonly-v948-pullbot.hf.space || true
          else:
            echo "verify_routing.py not found, basic check only:"
            curl -i https://danilaonly-v948-pullbot.hf.space/health
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Space**: https://huggingface.co/spaces/danilaonly/v948-pullbot" >> $GITHUB_STEP_SUMMARY
          echo "- **Public URL**: https://danilaonly-v948-pullbot.hf.space" >> $GITHUB_STEP_SUMMARY
          echo "- **Health**: https://danilaonly-v948-pullbot.hf.space/health" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

name: Auto-Deploy to HF Space

on:
  push:
    branches: [main]
    paths:
      - 'MEMORY.md'
      - 'SELF_IMPROVEMENT.md'
      - 'META_PROMPT_QUICK_REF.md'
      - 'CONVERSATION_LOG.md'
      - 'EARLIER_SESSIONS.md'
      - 'TECHNICAL_DISCOVERIES.md'
      - 'FAILED_ATTEMPTS.md'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Sync memory files to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Only sync MEMORY files — NOT smart_bot_v3.mjs, Dockerfile, README.md, start.sh
          # Those have HF-specific versions that must not be overwritten
          FILES=(
            "MEMORY.md"
            "SELF_IMPROVEMENT.md"
            "META_PROMPT_QUICK_REF.md"
            "CONVERSATION_LOG.md"
            "EARLIER_SESSIONS.md"
            "TECHNICAL_DISCOVERIES.md"
            "FAILED_ATTEMPTS.md"
          )
          
          for file in "${FILES[@]}"; do
            if [ -f "$file" ]; then
              CONTENT=$(base64 -w 0 "$file")
              echo "Pushing $file..."
              
              PAYLOAD=$(jq -n \
                --arg summary "Auto-sync $file from GitHub" \
                --arg path "$file" \
                --arg content "$CONTENT" \
                '{summary: $summary, files: [{path: $path, content: $content, encoding: "base64"}]}')
              
              RESULT=$(curl -s -X POST "https://huggingface.co/api/spaces/danilaonly/smart-tg-bot/commit/main" \
                -H "Authorization: Bearer $HF_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD")
              echo "  $file: $(echo $RESULT | jq -r '.commitOid // .error // "failed"')"
            fi
          done
          
          echo "✅ Memory sync complete (bot code NOT touched)"

name: Auto-Deploy & Sync

on:
  push:
    branches: [main]
    paths:
      - 'SELF_IMPROVEMENT.md'
      - 'MEMORY.md'
      - 'CRITICAL_RULES.md'
      - 'CHANGELOG.md'
      - 'TEMPLATES.md'
      - 'TECHNICAL_DISCOVERIES.md'
      - 'FAILED_ATTEMPTS.md'
      - 'CONVERSATION_LOG.md'
      - 'META_PROMPT_QUICK_REF.md'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TG_TOKEN: ${{ secrets.TG_TOKEN }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Sync all memory files to HF Space
        run: |
          FILES=(
            "SELF_IMPROVEMENT.md"
            "MEMORY.md"
            "CRITICAL_RULES.md"
            "CHANGELOG.md"
            "TEMPLATES.md"
            "TECHNICAL_DISCOVERIES.md"
            "FAILED_ATTEMPTS.md"
            "CONVERSATION_LOG.md"
            "META_PROMPT_QUICK_REF.md"
          )
          for f in "${FILES[@]}"; do
            if [ -f "$f" ]; then
              CONTENT=$(base64 -w 0 "$f")
              PAYLOAD=$(jq -n --arg s "Auto-sync $f" --arg p "$f" --arg c "$CONTENT" \
                '{summary: $s, files: [{path: $p, content: $c, encoding: "base64"}]}')
              curl -s -X POST "https://huggingface.co/api/spaces/danilaonly/smart-tg-bot/commit/main" \
                -H "Authorization: Bearer $HF_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD" > /dev/null
              echo "  ✓ $f synced to HF"
            fi
          done
      
      - name: Backup to Telegram channel
        run: |
          for f in SELF_IMPROVEMENT.md MEMORY.md CRITICAL_RULES.md CHANGELOG.md; do
            if [ -f "$f" ]; then
              curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendDocument" \
                -F "chat_id=-1003609243674" \
                -F "document=@$f" \
                -F "caption=$f — auto-sync $(date -u +'%Y-%m-%d %H:%M')" > /dev/null
              echo "  ✓ $f backed up to Telegram"
            fi
          done

# Smart Bot — Render Blueprint
services:
  - type: web
    name: smart-tg-bot
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: npm install
    startCommand: node scripts/smart_bot_v3.mjs
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: TG_TOKEN
        sync: false
      - key: ALLOWED_CHATS
        value: "396449039"
      - key: NODE_ENV
        value: production
      - key: WEBHOOK_MODE
        value: "true"
